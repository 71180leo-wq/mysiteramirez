<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Sistema de Gestión{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { padding-top: 80px; background-color: #f8f9fa; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">🏠 Sistema de Gestión</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_clientes' %}">👥 Clientes</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_empleados' %}">👷 Empleados</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_proveedores' %}">🤝 Proveedores</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_productos' %}">📦 Productos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_usuarios' %}">👤 Usuarios</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_venta' %}">👤 Ventas</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_compras' %}">👤 Compras</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_grupos' %}">👤 Grupos</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_inventario' %}">👤 Inventario</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'lista_sucursal' %}">👤 Sucursal</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
