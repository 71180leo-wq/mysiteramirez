{% extends 'base.html' %}

{% block title %}Editar Proveedor{% endblock %}

{% block content %}
    <h2>Editar Proveedor</h2>
    <form action="" method="POST">
        {% csrf_token %}
        <div class="mb-3">
            <label>Nombre</label>
            <input type="text" name="nombre" value="{{ proveedor.nombre }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Apellido</label>
            <input type="text" name="apellido" value="{{ proveedor.apellido }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Sexo</label>
            <input type="text" name="sexo" value="{{ proveedor.sexo }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Tipo</label>
            <input type="text" name="tipo" value="{{ proveedor.tipo }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Dirección</label>
            <input type="text" name="direccion" value="{{ proveedor.direccion }}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
        <a href="{% url 'lista_proveedores' %}" class="btn btn-secondary">Cancelar</a>
    </form>
{% endblock %}
