<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pantalla Cliente</title>
    
    <!-- Bootstrap 5 (opcional pero recomendado para que se vea bien) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .container {
            max-width: 900px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1 class="text-center mb-4">👋 Bienvenido a la Pantalla de Cliente</h1>
        
        <div class="card shadow-sm">
            <div class="card-body">
                <h4>Explorar Tiendas</h4>
                <p class="text-muted">Aquí podrás ver las tiendas disponibles y sus productos.</p>
                
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5>Supermercado</h5>
                                <p class="text-success">Abierto</p>
                                <a href="#" class="btn btn-primary btn-sm">Ver</a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5>Panadería</h5>
                                <p class="text-success">Abierto</p>
                                <a href="#" class="btn btn-primary btn-sm">Ver</a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-md-4 mb-3">
                        <div class="card h-100">
                            <div class="card-body text-center">
                                <h5>Farmacia</h5>
                                <p class="text-danger">Cerrado</p>
                                <a href="#" class="btn btn-primary btn-sm">Ver</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center mt-4">
            <a href="#" class="btn btn-success">Ver todos los productos</a>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
