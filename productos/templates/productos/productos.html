<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestión de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding-top: 20px; }
        .container { max-width: 1200px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="text-center mb-4">📦 Gestión de Productos</h1>
        
        <div class="d-flex justify-content-between mb-3">
            <input type="text" class="form-control w-50" placeholder="Buscar producto...">
            <a href="#" class="btn btn-primary">+ Nuevo Producto</a>
        </div>

        <table class="table table-hover">
            <thead class="table-dark">
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Arroz 1kg</td><td>$2.500</td><td class="text-success">120</td><td>Disponible</td><td><button class="btn btn-sm btn-warning">Editar</button></td></tr>
                <tr><td>Leche 1L</td><td>$1.800</td><td class="text-danger">8</td><td>Bajo stock</td><td><button class="btn btn-sm btn-warning">Editar</button></td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
