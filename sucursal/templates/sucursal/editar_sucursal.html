{% extends 'base.html' %}

{% block title %}Editar Sucursal{% endblock %}

{% block content %}
    <h2 class="mb-4">✏️ Editar Sucursal: {{ sucursal.nombre }}</h2>
    <div class="card">
        <div class="card-body">
            <form action="" method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Nombre de la Sucursal</label>
                        <input type="text" name="nombre" value="{{ sucursal.nombre }}" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Ciudad</label>
                        <input type="text" name="ciudad" value="{{ sucursal.ciudad }}" class="form-control" required>
                    </div>
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold">Dirección</label>
                        <input type="text" name="direccion" value="{{ sucursal.direccion }}" class="form-control" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-bold">Teléfono</label>
                        <input type="text" name="telefono" value="{{ sucursal.telefono|default:'' }}" class="form-control">
                    </div>
                </div>

                <div class="mt-4 text-end">
                    <button type="submit" class="btn btn-primary px-4">Guardar Cambios</button>
                    <a href="{% url 'lista_sucursal' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
