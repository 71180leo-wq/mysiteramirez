{% extends 'base.html' %}

{% block title %}Editar Compra{% endblock %}

{% block content %}
    <div class="container mt-4">
        <h2>✏️ Editar Compra: {{ compra.folio }}</h2>
        <hr>
        <form action="" method="POST">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Folio</label>
                    <input type="text" name="folio" value="{{ compra.folio }}" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Fecha</label>
                    <input type="date" name="fecha" value="{{ compra.fecha|date:'Y-m-d' }}" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Subtotal</label>
                    <input type="number" step="0.01" name="subtotal" value="{{ compra.subtotal }}" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">IVA</label>
                    <input type="number" step="0.01" name="iva" value="{{ compra.iva }}" class="form-control" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label fw-bold">Total</label>
                    <input type="number" step="0.01" name="total" value="{{ compra.total }}" class="form-control" required>
                </div>
                
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    <a href="{% url 'lista_compra' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </div>
        </form>
    </div>
{% endblock %}
