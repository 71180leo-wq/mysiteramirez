<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pantalla Empleados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding-top: 20px; }
        .container { max-width: 1100px; }
    </style>
</head>
<body>
        <style>
        table, th, td{
            border: 2px solid darkblue;
            border-collapse: collapse ;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .container {
            max-width: 900px;
        }
    </style>

    <div class="container">
        <h1 class="text-center mb-4">👷‍♂️ Panel de Empleados</h1> 
        <from action="/pageempleados/nuevo/" method="POST">
            {% csrf_token %}
            <input type="text" name="nombre" placeholder="Solo tu nombre"><br>
            <input type="text" name="apellido" placeholder="Solo el apellido"><br>
            <input type="text" name="sexo" placeholder="H o M"><br>
            <input type="text" name="tipo"  placeholder="General"><br>
            <input type="text" name="direccion" placeholder="Dirccion correcta"><br>
            <br><button>Guardar</button>
        </from>

        
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card h-100 text-center">
                    <div class="card-body">
                        <h5>Empleados Activos</h5>
                        <h2 class="text-primary">12</h2>
                        <a href="#" class="btn btn-primary btn-sm">Ver Lista</a>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card h-100 text-center">
                    <div class="card-body">
                        <h5>Turno Actual</h5>
                        <h2 class="text-success">8</h2>
                        <p class="text-muted">Personal trabajando</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card h-100 text-center">
                    <div class="card-body">
                        <h5>Registrar Asistencia</h5>
                        <a href="#" class="btn btn-success mt-3">Marcar Entrada</a>
                    </div>
                </div>
            </div>
        </div>

        <h4 class="mt-5">Lista de Empleados</h4>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Cargo</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Juan Pérez</td><td>Cajero</td><td class="text-success">Activo</td><td><button class="btn btn-sm btn-outline-primary">Editar</button></td></tr>
                <tr><td>María López</td><td>Atención al cliente</td><td class="text-success">Activo</td><td><button class="btn btn-sm btn-outline-primary">Editar</button></td></tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
